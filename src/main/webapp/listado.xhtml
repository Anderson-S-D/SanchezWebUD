<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Listado de Aspirantes</title>
    <h:outputStylesheet name="css/styles.css" />
</h:head>

<h:body>
    <div class="container">
        <h2>Aspirantes Registrados</h2>

        <h:panelGroup rendered="#{empty aspiranteBean.listaAspirantes}">
            <p>No hay aspirantes registrados.</p>
        </h:panelGroup>

        <h:dataTable value="#{aspiranteBean.listaAspirantes}" var="asp"
                     rendered="#{not empty aspiranteBean.listaAspirantes}">
            <h:column>
                <f:facet name="header">Identificación</f:facet>
                <h:outputText value="#{asp.identificacion}" />
            </h:column>
            <h:column>
                <f:facet name="header">Nombres</f:facet>
                <h:outputText value="#{asp.nombre}" />
            </h:column>
            <h:column>
                <f:facet name="header">Apellidos</f:facet>
                <h:outputText value="#{asp.apellido}" />
            </h:column>
            <h:column>
                <f:facet name="header">Correo</f:facet>
                <h:outputText value="#{asp.correo}" />
            </h:column>
            <h:column>
                <f:facet name="header">Teléfono</f:facet>
                <h:outputText value="#{asp.telefono}" />
            </h:column>
            <h:column>
                <f:facet name="header">Programa Académico</f:facet>
                <h:outputText value="#{asp.programa.nombre}" />
            </h:column>
        </h:dataTable>

        <div class="button-container">
            <h:outputLink value="index.xhtml" class="btn btn-outline">Volver al Registro</h:outputLink>
        </div>
    </div>
</h:body>

</html>
